services:
  nginx:
    build:
      context: ./nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - static_volume:/app/staticfiles

  db:
    image: postgres:15
    container_name: habits_db
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      - nginx

  redis:
    image: redis:7-alpine
    container_name: habits_redis
    env_file:
      - .env
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: habits_backend
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py runserver 0.0.0.0:8000
      "
    volumes:
      - .:/app
      - static_volume:/app/static
      - media_volume:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - app-network
    extra_hosts:
      - "localhost:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "manage.py", "check", "--database", "default" ]
      interval: 10s
      timeout: 5s
      retries: 10
#      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
#      interval: 30s
#      timeout: 10s
#      retries: 3

  celery:
    build: .
    container_name: habits_celery
    command: celery -A config worker -l INFO
    volumes:
      - .:/app
    env_file:
      - .env
    networks:
      - app-network
    extra_hosts:
      - "localhost:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

#  flower:
#   container_name: flower
#   build: .
#   command: sh -c "celery -A conf.celery flower"
#   restart: always
#   links:
#     - redis
#   depends_on:
#     - redis
#   ports:
#     - "5555:5555"
#   env_file: ".env"
#   environment:
#     PG_DB_HOST: db
#     broker_url: redis://localhost:6379/0
#   volumes:
#     - ./flower_data:/var/lib/flower

  celery-beat:
    build: .
    container_name: habits_celery_beat
    command: celery -A config beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file:
      - .env
    networks:
      - app-network
    extra_hosts:
      - "localhost:host-gateway"
    depends_on:
      backend:
        condition: service_healthy  # ВАЖНО: первая и ключевая зависимость!
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      celery:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:

networks:
  app-network:
    driver: bridge
